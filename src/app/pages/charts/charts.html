<!-- Page Header -->
<div class="flex items-center justify-between mb-8">
  <div>
    <h1 class="text-2xl font-bold text-primary">Charts</h1>
    <p class="text-sm mt-1 text-muted">Visual data representations using ECharts.</p>
  </div>
</div>

<!-- Row 1: Bar + Line -->
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5 mb-5">

  <div class="card p-5">
    <h2 class="text-sm font-semibold text-primary mb-1">Monthly Revenue</h2>
    <p class="text-xs text-muted mb-4">Bar chart — 2025</p>
    <div echarts [options]="barOption" class="w-full h-56"></div>
  </div>

  <div class="card p-5">
    <h2 class="text-sm font-semibold text-primary mb-1">Revenue vs Expenses</h2>
    <p class="text-xs text-muted mb-4">Area line chart — 2025</p>
    <div echarts [options]="lineOption" class="w-full h-56"></div>
  </div>

</div>

<!-- Row 2: Pie + Stacked -->
<div class="grid grid-cols-1 xl:grid-cols-2 gap-5">

  <div class="card p-5">
    <h2 class="text-sm font-semibold text-primary mb-1">Traffic Sources</h2>
    <p class="text-xs text-muted mb-4">Donut chart</p>
    <div echarts [options]="pieOption" class="w-full h-56"></div>
  </div>

  <div class="card p-5">
    <h2 class="text-sm font-semibold text-primary mb-1">Sales by Product</h2>
    <p class="text-xs text-muted mb-4">Stacked bar chart — quarterly</p>
    <div echarts [options]="stackedOption" class="w-full h-56"></div>
  </div>

</div>
