<div class="step-content">
  <div class="step-header">
    <h2 class="step-title">Elige el modelo</h2>
    <p class="step-subtitle">
      Modelos disponibles para
      <span class="highlight">{{ furnitureType?.name }}</span>
    </p>
  </div>

  <div class="model-grid">
    <button
      *ngFor="let model of filteredModels"
      class="model-card"
      [class.selected]="selectedModel?.id === model.id"
      (click)="selectModel(model)"
      [attr.aria-pressed]="selectedModel?.id === model.id"
    >
      <!-- Imagen del modelo -->
      <div class="model-image-area">
        <img
          [src]="model.imageUrl"
          [alt]="model.name"
          class="model-image"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"
        />
        <!-- Fallback si no hay imagen -->
        <div class="model-image-fallback" style="display:none">
          <span class="fallback-icon">🪑</span>
        </div>
        <!-- Badge seleccionado -->
        <div class="model-selected-badge" *ngIf="selectedModel?.id === model.id">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>

      <!-- Info -->
      <div class="model-info">
        <h3 class="model-name">{{ model.name }}</h3>
        <p class="model-desc">{{ model.description }}</p>
      </div>
    </button>
  </div>

  <div class="step-actions">
    <button class="btn-secondary" (click)="onBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Atrás
    </button>
    <button class="btn-primary" [disabled]="!selectedModel" (click)="onNext()">
      Continuar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>
