<div class="step-content">
  <div class="step-header">
    <h2 class="step-title">¿Qué mueble necesitas?</h2>
    <p class="step-subtitle">Elige el tipo de mueble que quieres diseñar y cotizar</p>
  </div>

  <div class="furniture-grid">
    <button *ngFor="let type of furnitureTypes" class="furniture-card" [class.selected]="selectedType?.id === type.id"
      [class.coming-soon]="type.comingSoon" (click)="!type.comingSoon && selectType(type)"
      [attr.aria-pressed]="selectedType?.id === type.id" [disabled]="type.comingSoon">
      <!-- Imagen del tipo de mueble -->
      <div class="furniture-card-image-area">
        <img [src]="type.imageUrl" [alt]="type.name" class="furniture-card-image" loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'" />
        <!-- Fallback si no hay imagen -->
        <div class="furniture-card-image-fallback" style="display:none">
          <span class="fallback-icon">🪑</span>
          <span class="fallback-label">Sin imagen</span>
        </div>

        <!-- Overlay Coming Soon -->
        <div class="coming-soon-overlay" *ngIf="type.comingSoon">
          <div class="coming-soon-badge">Próximamente</div>
        </div>

        <!-- Badge seleccionado -->
        <!-- <div class="furniture-card-selected-badge" *ngIf="selectedType?.id === type.id">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div> -->
        @if (selectedType?.id === type.id) {
        <div class="furniture-card-selected-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        }
      </div>

      <!-- Texto -->
      <div class="furniture-card-body">
        <h3 class="furniture-card-name">{{ type.name }}</h3>
        <p class="furniture-card-desc">{{ type.description }}</p>
      </div>
    </button>
  </div>

  <div class="step-actions">
    <div></div>
    <button class="btn-primary" [disabled]="!selectedType" (click)="onNext()">
      Continuar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12" />
        <polyline points="12 5 19 12 12 19" />
      </svg>
    </button>
  </div>
</div>
