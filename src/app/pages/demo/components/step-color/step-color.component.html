<div class="step-content">
  <div class="step-header">
    <h2 class="step-title">Elige el color de melamina</h2>
    <p class="step-subtitle">Selecciona el acabado que mejor se adapte a tu espacio</p>
  </div>

  <!-- Preview del color seleccionado -->
  <div class="color-preview-bar" *ngIf="selectedColor">
    <div class="color-preview-swatch" [style.background]="selectedColor.hex"></div>
    <div class="color-preview-info">
      <span class="color-preview-name">{{ selectedColor.name }}</span>
      <span class="color-preview-category">{{ selectedColor.category }}</span>
    </div>
    <div class="color-preview-badge">Seleccionado ✓</div>
  </div>

  <!-- Categorías de colores -->
  <div class="color-categories">
    <div *ngFor="let category of categories" class="color-category">
      <h3 class="category-title">{{ category }}</h3>
      <div class="color-swatches">
        <button
          *ngFor="let color of getColorsByCategory(category)"
          class="color-swatch"
          [class.selected]="selectedColor?.id === color.id"
          (click)="selectColor(color)"
          [title]="color.name"
          [attr.aria-label]="color.name"
          [attr.aria-pressed]="selectedColor?.id === color.id"
        >
          <div class="swatch-circle" [style.background]="color.hex">
            <span class="swatch-check" *ngIf="selectedColor?.id === color.id">✓</span>
          </div>
          <span class="swatch-name">{{ color.name }}</span>
        </button>
      </div>
    </div>
  </div>

  <div class="step-actions">
    <button class="btn-secondary" (click)="onBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Atrás
    </button>
    <button class="btn-primary" [disabled]="!selectedColor" (click)="onNext()">
      Continuar
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>
